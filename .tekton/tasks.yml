apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  steps:
    - name: cleanup-resources
      image: alpine:latest
      script: |
        #!/bin/sh
        echo "Cleaning up previous resources..."
        echo "Cleanup complete!"

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nose-test
spec:
  steps:
    - name: run-nose-tests
      image: python:3.9-slim
      script: |
        #!/bin/bash
        echo "Installing dependencies..."
        pip install nose coverage
        echo "Running nose tests..."
        nosetests --with-coverage --cover-package=src
        echo "Tests completed!"

---
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: oc-pipelines-oc-final
spec:
  workspaces:
    - name: source
  tasks:
    - name: cleanup
      taskRef:
        name: cleanup
    - name: nose-test
      taskRef:
        name: nose-test
      runAfter:
        - cleanup
